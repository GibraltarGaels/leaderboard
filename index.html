<script>

async function loadLeaderboard() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtmHxiXLA6_CNu9E8DDYMsWSo1Es4nJ5Jk4-KGM08-OiTYxeG0LNDa7UmRn5Azon2y1iDVowv9--u7/pub?gid=1858004008&output=csv";

  const res = await fetch(url);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));
  const data = rows.slice(1);

  data.sort((a,b)=>b[11]-a[11]);

  let html = "<table><tr><th>Pos</th><th>Name</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>Total</th></tr>";

  data.forEach((r,i)=>{
    html += `<tr>
      <td>${i+1}</td>
      <td class="name">${r[0]}</td>
      <td>${r[1]}</td>
      <td>${r[2]}</td>
      <td>${r[3]}</td>
      <td>${r[4]}</td>
      <td>${r[5]}</td>
      <td>${r[11]}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("leaderboardTableWrap").innerHTML = html;
}

loadLeaderboard();

document.getElementById("entryForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = new FormData(e.target);
  data.append("name", document.getElementById("name").value);
  data.append("email", document.getElementById("email").value);

  fetch("https://script.google.com/macros/s/AKfycbyLK1O15iIFUX_D1NNj4Z7GOt2LJtD0pmGGcxzvymBvSljJSqYFLqxz3KISelY07WdErA/exec", {
    method:"POST",
    body:data,
    mode:"no-cors"
  }).then(()=>window.location="thank-you.html");
});

const deadline = new Date("April 9, 2026 12:00:00 GMT+0200");

setInterval(()=>{
  const t = deadline - new Date();
  if(t<0){document.getElementById("countdown").innerHTML="Closed";return;}
  const h=Math.floor(t/3600000);
  const m=Math.floor((t%3600000)/60000);
  document.getElementById("countdown").innerHTML=`${h}h ${m}m left`;
},1000);

</script>
